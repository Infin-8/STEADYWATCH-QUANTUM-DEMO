<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Quantum V^ LLC</title>
    <meta name="description" content="Get in touch with Quantum V^ LLC. Contact us for quantum computing consulting, blockchain security, or general inquiries.">
    <link rel="icon" href="images/logo.png" type="image/png">
    <link rel="stylesheet" href="styles.css"></link>
    <script src="header-hurwitz-bg.js" defer></script>
    <script src="app.js" defer></script>
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="container">
            <a href="https://apps.apple.com/us/app/steadywatch-handheld/id6755752518" class="nav-brand">
                <img src="images/logo.png" alt="STEADYWATCH Logo">
                <span><u>STEADYWATCH™</u></span>
            </a>
            <button class="mobile-menu-toggle" onclick="toggleMobileMenu()">☰</button>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html" class="quickShadow">Home</a></li>
                <li><a href="consulting-services.html" class="quickShadow">Consulting</a></li>
                <li><a href="game.html" class="quickShadow">Game</a></li>
            </ul>
        </div>
    </nav>

    <!-- Header -->
    <header style="background: black !important;">
        <div class="header-hurwitz-dots" id="header-hurwitz-dots" aria-hidden="true"></div>
        <div class="header-content">
        <div class="container">
            <h1 style="text-shadow: 3px 2px 2px black; font-size: 2.5em">
                <strong>How To Connect</strong>
            </h1>
            <p class="subtitle">Complete the form or call/text</p>

            <div style="margin-top: 30px text-shadow: 1px 1px 2px black;">
                <span><a class="cta-button secondary" style="color: white !important; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);" href="tel:4803417382">480-341-7382</a></span>
            </div>
            
            <div style="margin-top: 30px;">
                <span style="text-shadow: 1px 1px 1px black; background: linear-gradient(135deg, #fdfdfd 0%, #6e85eb 100%); color: white; !important" class="badge">⭐︎ Trusted</span>
                <span style="text-shadow: 1px 1px 1px black; background: linear-gradient(135deg, #fdfdfd 0%, #6e85eb 100%); color: white; !important" class="badge">⭐︎ Realiable</span>
                <span style="text-shadow: 1px 1px 1px black; background: linear-gradient(135deg, #fdfdfd 0%, #6e85eb 100%); color: white; !important" class="badge">⭐︎ Validated</span>
                <span style="text-shadow: 1px 1px 1px black; background: linear-gradient(135deg, #fdfdfd 0%, #6e85eb 100%); color: white; !important" class="badge">⭐︎ Unconditional</span>
                <span style="text-shadow: 1px 1px 1px black; background: linear-gradient(135deg, #fdfdfd 0%, #6e85eb 100%); color: white; !important" class="badge">⭐︎ Secure</span>
            </div>

        </div>
        </div>
    </header>

    <!-- Contact Form -->
    <section class="contact-section">
        <div class="container">
            <form class="contact-form" id="contactForm" style="color: white !important; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                <div class="form-group">
                    <label for="name">Name *</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="company">Company / Organization</label>
                    <input type="text" id="company" name="company">
                </div>

                <div class="form-group">
                    <label for="inquiry">How can we help? *</label>
                    <select id="inquiry" name="inquiry" required>
                        <option value="">Select an option...</option>
                        <option value="Blockchain Security">Cyber-Security / Quantum-Resistant Cryptography</option>
                        <option value="Consulting">Consulting Services</option>
                        <option value="QKD">QKD Protocol / Quantum Key Distribution</option>
                        <option value="Research">Research Collaboration</option>
                        <option value="Partnership">Partnership Opportunity</option>
                        <option value="General">General Inquiry</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Message *</label>
                    <textarea id="message" name="message" required placeholder="Tell us about your project, questions, or how we can help..."></textarea>
                </div>

               <button type="submit" class="submit-button" style="border: 2px solid #f0f9fb; text-shadow: 1px 1px 1px black; background: linear-gradient(135deg, #fdfdfd 0%, #6e85eb 100%) !important;">Send</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer style="background: #333; color: white; text-align: center; padding: 40px 0;">
      <div class="container">
            <p>&copy; 2025 <u>Quantum V^ LLC</u></p>
            <p>All Rights Reserved.</p>
            <p style="margin-top: 10px; opacity: 0.8;">
                <a href="index.html" style="color: white; text-decoration: none;">| Home</a> | 
                <a href="consulting-services.html" style="color: white; text-decoration: none;">Consulting</a> |                 
            </p>
        </div>
    </footer>

    <script>
        // Simple form submission - just opens email with form data
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const company = document.getElementById('company').value;
            const inquiry = document.getElementById('inquiry').value;
            const message = document.getElementById('message').value;
            
            const subject = `Contact Form: ${inquiry}`;
            const body = `Name: ${name}\nEmail: ${email}\nCompany: ${company || 'Not provided'}\n\nInquiry Type: ${inquiry}\n\nMessage:\n${message}`;
            
            window.location.href = `mailto:nate_vazquez@icloud.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        }); 
    </script>
</body>
</html>
